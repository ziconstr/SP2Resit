<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | AuctionHouse</title>
    <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body class="bg-gray-100 min-h-screen">

    <script type="module" src="/js/components/navbar.js"></script>

    <main class="max-w-md mx-auto px-4 py-16">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">

        <h1 class="text-2xl font-extrabold text-gray-800 mb-1">Welcome back</h1>
        <p class="text-gray-400 text-sm mb-6">Log in to your AuctionHouse account</p>

        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-4"></div>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input
              type="email"
              id="email"
              placeholder="name@stud.noroff.no"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#0063FB]"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Your password"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#0063FB]"
            />
          </div>

          <button
            id="login-btn"
            class="w-full bg-[#0063FB] hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition text-sm">
            Log in
          </button>
        </div>

        <p class="text-center text-sm text-gray-400 mt-6">
          Don't have an account?
          <a href="/register.html" class="text-[#0063FB] font-semibold hover:underline">Register</a>
        </p>

      </div>
    </main>

    <script type="module" src="/js/login.js"></script>
  </body>
</html>
